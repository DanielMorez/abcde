services:
  nginx:
    build: .
    network_mode: host
    volumes:
      - certbot_conf:/etc/letsencrypt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot:latest
    network_mode: host
    volumes:
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --standalone --pre-hook 'nginx -s stop 2>/dev/null || true' --post-hook 'nginx 2>/dev/null || true'; sleep 12h & wait $${!}; done;"
    restart: unless-stopped

volumes:
  certbot_conf:
