services:
  web:
    build: .
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      STREAM_UPSTREAM: ${STREAM_UPSTREAM:-172.17.0.1:88}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  caddy_data:
  caddy_config:
