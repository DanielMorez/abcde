services:
  nginx:
    build: .
    network_mode: host
    env_file: .env
    volumes:
      - certbot_conf:/etc/letsencrypt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot:latest
    profiles: ["renew"]
    network_mode: host
    volumes:
      - certbot_conf:/etc/letsencrypt
    entrypoint: ["certbot"]
    command: ["renew", "--standalone", "--disable-hook-validation"]
    restart: "no"

volumes:
  certbot_conf:
