services:
  cert-init:
    image: certbot/certbot:latest
    network_mode: host
    env_file: .env
    volumes:
      - certbot_conf:/etc/letsencrypt
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        : "$${PRIMARY_DOMAIN:?Set PRIMARY_DOMAIN in .env}"
        if [ ! -f "/etc/letsencrypt/live/$${PRIMARY_DOMAIN}/fullchain.pem" ]; then
          echo "Creating dummy certificate for $${PRIMARY_DOMAIN}..."
          mkdir -p "/etc/letsencrypt/live/$${PRIMARY_DOMAIN}"
          openssl req -x509 -nodes -newkey rsa:4096 -days 1 \
            -keyout "/etc/letsencrypt/live/$${PRIMARY_DOMAIN}/privkey.pem" \
            -out "/etc/letsencrypt/live/$${PRIMARY_DOMAIN}/fullchain.pem" \
            -subj "/CN=$${PRIMARY_DOMAIN}"
        fi

  nginx:
    build: .
    network_mode: host
    env_file: .env
    depends_on:
      cert-init:
        condition: service_completed_successfully
    volumes:
      - certbot_conf:/etc/letsencrypt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot:latest
    network_mode: host
    volumes:
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --standalone --pre-hook 'nginx -s stop 2>/dev/null || true' --post-hook 'nginx 2>/dev/null || true'; sleep 12h & wait $${!}; done;"
    restart: unless-stopped

volumes:
  certbot_conf:
